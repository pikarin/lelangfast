x-app: &app
  build:
    context: .
    target: production
  env_file: .env
  depends_on:
    mysql:
      condition: service_healthy
    redis:
      condition: service_healthy
  networks:
    - lelangfast

services:
  # ─── Web Server (FrankenPHP) ────────────────────────────
  php:
    <<: *app
    ports:
      - "${APP_PORT:-8080}:8080"
      - "${APP_SSL_PORT:-8443}:8443"
    environment:
      AUTORUN_ENABLED: "true"
      SSL_MODE: "off"
      PHP_OPCACHE_ENABLE: "1"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/up"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ─── MySQL Database ─────────────────────────────────────
  mysql:
    image: mysql:8.4
    ports:
      - "${FORWARD_DB_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    environment:
      MYSQL_DATABASE: "${DB_DATABASE:-lelangfast}"
      MYSQL_USER: "${DB_USERNAME:-lelangfast}"
      MYSQL_PASSWORD: "${DB_PASSWORD:-password}"
      MYSQL_ROOT_PASSWORD: "${DB_PASSWORD:-password}"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-password}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - lelangfast

  # ─── Redis ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "${FORWARD_REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - lelangfast

  # ─── Horizon (Queue Worker + Dashboard) ─────────────────
  horizon:
    <<: *app
    command: ["php", "/var/www/html/artisan", "horizon"]
    stop_signal: SIGTERM
    environment:
      AUTORUN_ENABLED: "false"
    healthcheck:
      test: ["CMD", "healthcheck-horizon"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─── Reverb (WebSocket Server) ──────────────────────────
  reverb:
    <<: *app
    command: ["php", "/var/www/html/artisan", "reverb:start", "--host=0.0.0.0", "--port=9000"]
    stop_signal: SIGTERM
    ports:
      - "${REVERB_SERVER_PORT:-9000}:9000"
    environment:
      AUTORUN_ENABLED: "false"
    healthcheck:
      test: ["CMD", "php", "-r", "@fsockopen('localhost', 9000) or exit(1);"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─── Scheduler (Cron) ──────────────────────────────────
  scheduler:
    <<: *app
    command: ["php", "/var/www/html/artisan", "schedule:work"]
    stop_signal: SIGTERM
    environment:
      AUTORUN_ENABLED: "false"

  # ─── Pulse Worker (Redis → DB ingest) ──────────────────
  pulse:
    <<: *app
    command: ["php", "/var/www/html/artisan", "pulse:work"]
    stop_signal: SIGTERM
    environment:
      AUTORUN_ENABLED: "false"

volumes:
  mysql-data:
  redis-data:

networks:
  lelangfast:
    driver: bridge
